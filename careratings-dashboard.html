  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#0D1B2A", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"12px 16px", fontSize:12 }}>

      {payload.map((p,i) => <div key={i} style={{ color:p.color, marginBottom:2 }}>{p.name}: <strong>{typeof p.value==="number"?p.value.toLocaleString():p.value}</strong></div>)}

  );
};

                </ResponsiveContainer>
              </Panel>
              <Panel>
                <div style={{ fontSize:13, color:"#8A9BB2", marginBottom:16 }}>Revenue Mix (FY2024)</div>
                <PieChart width={220} height={220} style={{ margin:"0 auto" }}>
                  <Pie data={[{ name:"Rating Fees", value:latestRev.ratingFees },{ name:"Surveillance", value:latestRev.surveillanceFees },{ name:"Advisory", value:latestRev.advisory }]} cx={105} cy={105} innerRadius={55} outerRadius={95} dataKey="value" paddingAngle={3}>
                    <Cell fill="#00C2A8" /><Cell fill="#5B8CFF" /><Cell fill="#9B59B6" />
                  </Pie>
                  <Tooltip formatter={(v) => `₹${v} Cr`} />
                </PieChart>
              </Panel>
            </div>
          </div>
        )}

      </div>

      {/* Footer */}
      <div style={{ padding:"16px 32px", borderTop:"1px solid rgba(255,255,255,0.07)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontSize:11, color:"#4A5C72" }}>Data sourced from CareEdge Ratings public disclosures, annual reports, SEBI filings & transition studies. Indicative figures.</div>
        <div style={{ fontSize:11, color:"#4A5C72" }}>Dashboard v1.0 — FY2018–FY2024</div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
